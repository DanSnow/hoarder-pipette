fileGroups:
  sources:
    - src/**/*
    - wxt.config.ts
tasks:
  build-logo:
    type: build
    command:
      - tsx
      - build/build-logo.mts
    outputs:
      - assets/logo16.png
      - assets/logo48.png
      - assets/logo128.png
      - assets/logo256.png
    inputs:
      - assets/logo.svg
    toolchains: node
  build-ext-chrome:
    type: build
    command:
      - wxt
      - zip
    outputs:
      - .output/chrome-mv3/**/*
    inputs:
      - "@group(sources)"
    toolchains: node
  build-ext-firefox:
    type: build
    command:
      - wxt
      - zip
      - -b
      - firefox
    outputs:
      - .output/firefox-mv2/**/*
    inputs:
      - "@group(sources)"
    toolchains: node
  build:
    type: build
    command: noop
    deps:
      - build-ext-chrome
      - build-ext-firefox
  dev:
    type: run
    command:
      - wxt
    toolchains: node
    preset: server
  test:
    command:
      - vitest
    toolchains: node
    inputs:
      - "@group(sources)"
      - vitest.config.ts
  typecheck:
    type: test
    command: tsc --noEmit
    toolchains: node
  typecheck-watch:
    type: run
    command: tsc --noEmit --watch
    toolchains: node
    preset: server
  generate-client:
    type: build
    command: openapi-ts
    toolchains: node

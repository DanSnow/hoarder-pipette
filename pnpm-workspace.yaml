packages:
  - .
  - docs

ignoreWorkspaceRootCheck: true

allowBuilds:
  esbuild: true
  sharp: true
  spawn-sync: true

ignoredBuiltDependencies:
  - core-js-pure
  - spawn-sync
  - svelte-preprocess

minimumReleaseAgeExclude:
  - lucide-react@1.25.0
  - shadcn@4.13.1

onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@moonrepo/cli'
  - '@swc/core'
  - '@tailwindcss/oxide'
  - esbuild
  - msw
  - oxc-resolver
  - sharp

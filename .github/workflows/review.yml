name: review

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tsc:
    name: runner / tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0.6.4
      - uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: '24.18.0'
          cache: pnpm
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1.5.0
      - run: pnpm install
      - uses: EPMatt/reviewdog-action-tsc@v1.11.0
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          level: error
      - run: pnpm run typecheck

  oxlint:
    name: runner / oxlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0.6.4
      - uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: '24.18.0'
          cache: pnpm
      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1.5.0
      - run: pnpm install
      - name: Run oxlint with reviewdog
        run: |
          pnpm exec oxlint --format=checkstyle | reviewdog -f=checkstyle -name=eslint -reporter=github-pr-review
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.github_token }}
      - run: pnpm run lint
